<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FairLens — AI Bias Audit Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0A0D14;
  --ink2:#12161F;
  --ink3:#1C2130;
  --ink4:#252D3D;
  --amber:#F5A623;
  --amber2:#FFBE55;
  --amber-dim:#3D2800;
  --teal:#00C9A7;
  --teal-dim:#003D32;
  --red:#FF4D4D;
  --red-dim:#3D0000;
  --muted:#4A5568;
  --muted2:#8896AB;
  --fg:#E8EDF5;
  --fg2:#C4CDD8;
  --fg3:#8896AB;
  --border:#1E2636;
  --border2:#2A3447;
  --card:#131824;
  --glow-amber:0 0 40px rgba(245,166,35,0.15);
  --glow-teal:0 0 40px rgba(0,201,167,0.12);
  --font-head:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
  --font-body:'DM Sans',sans-serif;
  --r:8px;
  --r2:12px;
}
html{scroll-behavior:smooth}
body{
  background:var(--ink);
  color:var(--fg);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE TEXTURE ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── LAYOUT ── */
#root{position:relative;z-index:1}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{
  background:var(--ink2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  padding:0 0 24px;
}
.main{flex:1;overflow-x:hidden}

/* ── SIDEBAR ── */
.sidebar-logo{
  padding:28px 24px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-mark{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--amber),#FF8C00);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-weight:800;font-size:16px;color:#000;
  flex-shrink:0;
  box-shadow:0 0 20px rgba(245,166,35,0.4);
}
.logo-text{font-family:var(--font-head);font-weight:800;font-size:18px;letter-spacing:-0.5px}
.logo-text span{color:var(--amber)}

.nav-section{padding:20px 16px 8px;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase;font-family:var(--font-mono)}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;margin:1px 8px;border-radius:var(--r);
  color:var(--fg3);cursor:pointer;transition:all .15s;
  font-size:13px;font-weight:500;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--ink3);color:var(--fg2)}
.nav-item.active{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,166,35,0.2)}
.nav-item .icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .icon{opacity:1}

.sidebar-footer{
  margin-top:auto;padding:16px 20px;
  border-top:1px solid var(--border);
}
.version-badge{
  font-family:var(--font-mono);font-size:10px;color:var(--fg3);
  background:var(--ink3);padding:4px 8px;border-radius:4px;border:1px solid var(--border2);
  display:inline-block;
}

/* ── TOP BAR ── */
.topbar{
  background:rgba(10,13,20,0.8);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar-title{font-family:var(--font-head);font-weight:700;font-size:16px}
.topbar-actions{display:flex;align-items:center;gap:12px}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;border:1px solid transparent;
  font-family:var(--font-body);
}
.btn-primary{
  background:var(--amber);color:#000;
  box-shadow:0 0 20px rgba(245,166,35,0.3);
}
.btn-primary:hover{background:var(--amber2);box-shadow:0 0 30px rgba(245,166,35,0.5)}
.btn-ghost{border-color:var(--border2);color:var(--fg2)}
.btn-ghost:hover{background:var(--ink3);border-color:var(--border2)}
.btn-teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(0,201,167,0.2)}
.btn-teal:hover{background:rgba(0,201,167,0.15)}

/* ── PAGE CONTENT ── */
.page{padding:32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.page-header{margin-bottom:28px}
.page-title{font-family:var(--font-head);font-weight:800;font-size:26px;letter-spacing:-0.5px}
.page-subtitle{color:var(--fg3);font-size:13px;margin-top:4px}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r2);
  padding:20px;position:relative;overflow:hidden;
  transition:border-color .2s;
}
.stat-card:hover{border-color:var(--border2)}
.stat-card::before{
  content:'';position:absolute;top:0;right:0;
  width:80px;height:80px;border-radius:50%;
  background:radial-gradient(circle,var(--accent-color,.05) 0%,transparent 70%);
  transform:translate(30%,-30%);
}
.stat-card.amber{--accent-color:rgba(245,166,35,.15)}
.stat-card.teal{--accent-color:rgba(0,201,167,.12)}
.stat-card.red{--accent-color:rgba(255,77,77,.1)}
.stat-card.blue{--accent-color:rgba(100,149,237,.1)}
.stat-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--fg3);font-family:var(--font-mono);margin-bottom:8px}
.stat-val{font-family:var(--font-head);font-size:30px;font-weight:800;line-height:1}
.stat-val.amber{color:var(--amber)}
.stat-val.teal{color:var(--teal)}
.stat-val.red{color:var(--red)}
.stat-sub{font-size:11px;color:var(--fg3);margin-top:6px}

/* ── CARDS ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
}
.card-head{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-family:var(--font-head);font-weight:700;font-size:14px}
.card-body{padding:20px}

/* ── GRID LAYOUT ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}

/* ── DATASET SELECTOR ── */
.dataset-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.dataset-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r2);
  padding:16px;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;
}
.dataset-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.dataset-card.active{border-color:var(--amber);background:var(--amber-dim);box-shadow:var(--glow-amber)}
.dataset-card .ds-icon{font-size:20px;margin-bottom:8px}
.dataset-card .ds-name{font-family:var(--font-head);font-weight:700;font-size:12px;margin-bottom:4px}
.dataset-card .ds-meta{font-size:10px;color:var(--fg3);font-family:var(--font-mono)}
.dataset-card .ds-badge{
  position:absolute;top:10px;right:10px;
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;
  font-family:var(--font-mono);letter-spacing:.5px;text-transform:uppercase;
}
.badge-high{background:var(--red-dim);color:var(--red)}
.badge-med{background:var(--amber-dim);color:var(--amber)}
.badge-low{background:var(--teal-dim);color:var(--teal)}

/* ── BIAS SCORE GAUGE ── */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0}
.gauge-svg{width:180px;height:110px}
.gauge-score{font-family:var(--font-head);font-size:44px;font-weight:800;text-align:center;line-height:1}
.gauge-label{font-size:12px;color:var(--fg3);text-align:center;margin-top:4px;font-family:var(--font-mono)}
.gauge-sev{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  margin-top:8px;letter-spacing:1px;text-transform:uppercase;font-family:var(--font-mono);
}

/* ── METRIC ROWS ── */
.metric-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.metric-row:last-child{border-bottom:none}
.metric-name{font-size:12px;color:var(--fg2);width:170px;flex-shrink:0}
.metric-bar-wrap{flex:1;height:6px;background:var(--ink3);border-radius:3px;overflow:hidden}
.metric-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.metric-val-label{font-family:var(--font-mono);font-size:11px;width:60px;text-align:right;flex-shrink:0}
.metric-status{width:48px;text-align:right;flex-shrink:0}

/* ── SHAP CHART ── */
.shap-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.shap-row:last-child{border-bottom:none}
.shap-feat{font-size:12px;color:var(--fg2);width:140px;flex-shrink:0;font-family:var(--font-mono);font-size:11px}
.shap-bar-wrap{flex:1;height:18px;background:var(--ink3);border-radius:3px;overflow:hidden;display:flex;align-items:center;position:relative}
.shap-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:8px}
.shap-bar span{font-size:10px;color:rgba(0,0,0,.6);font-weight:600;font-family:var(--font-mono);white-space:nowrap}
.shap-score{font-family:var(--font-mono);font-size:11px;color:var(--fg3);width:50px;text-align:right;flex-shrink:0}

/* ── MITIGATION COMPARE ── */
.mit-card{
  background:var(--ink3);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:12px;
  display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:all .2s;
}
.mit-card:hover{border-color:var(--border2)}
.mit-card.best{border-color:var(--teal);background:var(--teal-dim);box-shadow:var(--glow-teal)}
.mit-icon{
  width:40px;height:40px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.mit-info{flex:1}
.mit-name{font-weight:600;font-size:13px;margin-bottom:3px}
.mit-desc{font-size:11px;color:var(--fg3)}
.mit-scores{text-align:right;flex-shrink:0}
.score-before{font-family:var(--font-mono);font-size:11px;color:var(--fg3)}
.score-after{font-family:var(--font-head);font-size:20px;font-weight:800}
.score-delta{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;font-family:var(--font-mono)}
.delta-pos{background:var(--teal-dim);color:var(--teal)}
.delta-neg{background:var(--red-dim);color:var(--red)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--border2)}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--fg3);font-family:var(--font-mono)}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--fg2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:var(--font-mono);font-size:11px}

/* ── UPLOAD ZONE ── */
.upload-zone{
  border:2px dashed var(--border2);border-radius:var(--r2);
  padding:48px;text-align:center;
  transition:all .2s;cursor:pointer;
  background:var(--ink3);
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--amber);background:var(--amber-dim)}
.upload-icon{font-size:32px;margin-bottom:12px;opacity:.5}
.upload-title{font-family:var(--font-head);font-weight:700;font-size:16px;margin-bottom:6px}
.upload-sub{font-size:12px;color:var(--fg3)}

/* ── PROGRESS ── */
.progress-bar{
  height:4px;background:var(--ink3);border-radius:2px;overflow:hidden;margin-top:8px;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--amber),var(--teal));
  border-radius:2px;transition:width .3s;
  animation:shimmer 1.5s infinite linear;
  background-size:200% 100%;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* ── PILLS ── */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;
  font-family:var(--font-mono);letter-spacing:.5px;text-transform:uppercase;
}
.pill-high{background:var(--red-dim);color:var(--red)}
.pill-med{background:var(--amber-dim);color:var(--amber)}
.pill-low{background:var(--teal-dim);color:var(--teal)}
.pill-pass{background:rgba(100,200,100,.15);color:#6DC86D}
.pill-fail{background:var(--red-dim);color:var(--red)}

/* ── TOOLTIP ── */
.tooltip-wrap{position:relative;display:inline-block}
.tooltip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--ink4);border:1px solid var(--border2);border-radius:6px;
  padding:6px 10px;font-size:11px;color:var(--fg2);white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;
  font-family:var(--font-mono);
}
.tooltip-wrap:hover .tooltip{opacity:1}

/* ── REPORT VIEW ── */
.report-section{margin-bottom:24px}
.report-section-title{
  font-family:var(--font-head);font-weight:700;font-size:13px;
  padding-bottom:10px;margin-bottom:14px;
  border-bottom:1px solid var(--border);
  color:var(--fg3);letter-spacing:.5px;text-transform:uppercase;font-size:11px;
}

/* ── LOADING ── */
.loading-overlay{
  position:fixed;inset:0;background:rgba(10,13,20,.85);
  backdrop-filter:blur(8px);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.loader{
  width:48px;height:48px;border:3px solid var(--border2);
  border-top-color:var(--amber);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--font-mono);font-size:13px;color:var(--fg3);letter-spacing:1px}
.loading-sub{font-size:11px;color:var(--muted2);font-family:var(--font-mono);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ── NOTIFICATION ── */
.notif{
  position:fixed;bottom:24px;right:24px;z-index:1000;
  background:var(--ink4);border:1px solid var(--border2);border-radius:var(--r);
  padding:14px 18px;font-size:13px;display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:slideIn .25s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.notif.success{border-left:3px solid var(--teal)}
.notif.error{border-left:3px solid var(--red)}
.notif.warn{border-left:3px solid var(--amber)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .dataset-grid{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── ANIMATED ENTRY ── */
.stagger-1{animation:fadeUp .35s ease .05s both}
.stagger-2{animation:fadeUp .35s ease .1s both}
.stagger-3{animation:fadeUp .35s ease .15s both}
.stagger-4{animation:fadeUp .35s ease .2s both}

/* ── HERO GRADIENT ── */
.hero-gradient{
  background:linear-gradient(135deg,var(--ink2) 0%,var(--ink) 60%,rgba(61,40,0,.3) 100%);
  border-bottom:1px solid var(--border);
  padding:40px 32px;
  position:relative;overflow:hidden;
}
.hero-gradient::after{
  content:'';position:absolute;
  top:-40px;right:-60px;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(245,166,35,.08) 0%,transparent 70%);
  pointer-events:none;
}
.hero-tag{
  font-family:var(--font-mono);font-size:11px;color:var(--amber);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;
}
.hero-title{font-family:var(--font-head);font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:10px}
.hero-title em{color:var(--amber);font-style:normal}
.hero-desc{font-size:13px;color:var(--fg3);max-width:480px;line-height:1.7}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef,useCallback}=React;

// ── API base (change to your deployed URL) ──
const API_BASE = 'http://localhost:8000';

// ── Dataset catalog ──
const DATASETS=[
  {id:'adult',name:'UCI Adult',icon:'💰',rows:'48,842',domain:'Income Prediction',protected:'Gender, Race',dataBias:92,modelBias:60,severity:'HIGH'},
  {id:'compas',name:'COMPAS',icon:'⚖️',rows:'7,214',domain:'Criminal Justice',protected:'Race',dataBias:55,modelBias:28,severity:'MEDIUM'},
  {id:'german',name:'German Credit',icon:'🏦',rows:'1,000',domain:'Loan Approval',protected:'Age',dataBias:60,modelBias:50,severity:'MEDIUM'},
  {id:'utrecht',name:'Utrecht Hiring',icon:'💼',rows:'2,000',domain:'Recruitment',protected:'Gender',dataBias:51,modelBias:22,severity:'MEDIUM'},
  {id:'diabetes130',name:'Diabetes 130',icon:'🏥',rows:'101,766',domain:'Medical',protected:'Race',dataBias:97,modelBias:83,severity:'HIGH'},
];

// ── Pre-baked audit results (so demo works without backend) ──
const AUDIT_DATA={
  adult:{
    dataScore:92,dataSev:'HIGH',modelScore:60,modelSev:'MEDIUM',
    dir:0.5017,dpg:0.220,tprGap:0.1344,fprGap:0.0433,flipRate:0.089,
    acc:0.9088,auc:0.9766,
    shap:[
      {feat:'age',val:3.887},{feat:'education_num',val:3.115},{feat:'capital_gain',val:1.224},
      {feat:'hours_per_week',val:1.128},{feat:'sex (protected)',val:0.951},{feat:'race (protected)',val:0.770},
      {feat:'marital_status',val:0.163},{feat:'relationship',val:0.119},{feat:'occupation',val:0.090},
    ],
    mit:[
      {name:'Pre-processing',sub:'Reweighing',icon:'⚖️',before:32,after:32,imp:0,color:'#F5A623'},
      {name:'In-processing',sub:'Fairness Constraint (ExponentiatedGradient)',icon:'🎯',before:32,after:24,imp:8,color:'#00C9A7'},
      {name:'Post-processing',sub:'Threshold Calibration',icon:'🔧',before:0,after:0,imp:0,color:'#6495ED'},
    ],
    recommendations:[
      'Apply reweighing to fix disparate impact on gender (DIR=0.50)',
      "Gender attribute statistically associated with outcome — investigate proxy features",
      'True positive rate gap of 0.134 detected — apply equalized odds post-processing',
      'MEDIUM RISK: Apply at least one mitigation strategy before deployment',
    ],
  },
  compas:{
    dataScore:55,dataSev:'MEDIUM',modelScore:28,modelSev:'LOW',
    dir:0.61,dpg:0.14,tprGap:0.08,fprGap:0.04,flipRate:0.04,

// ── Helpers ──
function sevColor(sev){return sev==='HIGH'?'var(--red)':sev==='MEDIUM'?'var(--amber)':'var(--teal)'}
function sevClass(sev){return sev==='HIGH'?'pill-high':sev==='MEDIUM'?'pill-med':'pill-low'}
function numColor(v,invert=false){
  if(invert) return v<0.5?'var(--red)':v<0.8?'var(--amber)':'var(--teal)';
  return v>=70?'var(--red)':v>=40?'var(--amber)':'var(--teal)';
}
function dirStatus(v){return v>=0.8?{cls:'pill-pass',label:'PASS ✓'}:{cls:'pill-fail',label:'FAIL ✗'}}

// ── Gauge SVG ──
function Gauge({score,color}){
  const pct=score/100;
  const r=70,cx=90,cy=90,sw=12;
  const arc=(p,full)=>{
    const a=(p*Math.PI)-(Math.PI/2);
    const x=cx+r*Math.cos(-Math.PI+p*Math.PI);
    const y=cy+r*Math.sin(-Math.PI+p*Math.PI);
    return `M ${cx-r} ${cy} A ${r} ${r} 0 ${p>.5?1:0} 1 ${x} ${y}`;
  };
  return React.createElement('svg',{viewBox:'0 0 180 100',className:'gauge-svg'},
    React.createElement('path',{d:arc(1,true),fill:'none',stroke:'var(--ink3)',strokeWidth:sw,strokeLinecap:'round'}),
    React.createElement('path',{d:arc(Math.max(.01,pct)),fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',
      style:{filter:`drop-shadow(0 0 8px ${color})`}}),
  );
}

// ── Mini bar ──
function Bar({val,max=100,color='var(--amber)'}){
  const pct=Math.min(100,(val/max)*100);
  return React.createElement('div',{className:'metric-bar-wrap'},
    React.createElement('div',{className:'metric-bar',style:{width:`${pct}%`,background:color}})
  );
}

    React.createElement('aside',{className:'sidebar'},
      React.createElement('div',{className:'sidebar-logo'},
        React.createElement('div',{className:'logo-mark'},'FL'),
        React.createElement('div',{className:'logo-text'},React.createElement('span',null,'Fair'),'Lens'),
      ),
      React.createElement('div',{className:'nav-section'},'Navigation'),
      navItems.map(n=>
        React.createElement('div',{
          key:n.id,
          className:`nav-item ${page===n.id?'active':''}`,
          onClick:()=>navigate(n.id),
        },
          React.createElement('span',{className:'icon'},n.icon),
          n.label,
        )
      ),
      React.createElement('div',{className:'nav-section'},'Datasets'),
      DATASETS.map(d=>
        React.createElement('div',{
          key:d.id,
          className:`nav-item ${page==='audit'&&auditDataset===d.id?'active':''}`,
          onClick:()=>navigate('audit',d.id),
        },
          React.createElement('span',{className:'icon'},d.icon),
          d.name,
          React.createElement('span',{className:`pill ${sevClass(d.severity)}`,style:{marginLeft:'auto',fontSize:'9px',padding:'2px 5px'}},d.dataBias),
        )
      ),
      React.createElement('div',{className:'sidebar-footer'},
        React.createElement('div',{className:'version-badge'},'FairLens v1.0.0'),
        React.createElement('div',{style:{fontSize:'10px',color:'var(--fg3)',marginTop:'6px',fontFamily:'var(--font-mono)'}},'Hack2Skill 2026'),
      )
    ),

    // Main
    React.createElement('main',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('div',{className:'topbar-title'},
          page==='home'?'Dashboard':
          page==='audit'?'Audit Explorer':
          page==='upload'?'Upload Dataset':'About & Docs'
        ),
        React.createElement('div',{className:'topbar-actions'},
          React.createElement('a',{
            href:'https://github.com/YOUR_USERNAME/fairlens',
            target:'_blank',
            className:'btn btn-ghost',style:{textDecoration:'none',fontSize:'12px'}
          },'⭐ GitHub'),
          React.createElement('a',{
            href:`${API_BASE}/docs`,target:'_blank',
            className:'btn btn-ghost',style:{textDecoration:'none',fontSize:'12px'}
          },'API Docs'),
          React.createElement('button',{className:'btn btn-primary',onClick:()=>navigate('upload')},'+ New Audit'),
        )
      ),
      page==='home'&&React.createElement(OverviewPage,{onNavigate:navigate}),
      page==='audit'&&React.createElement(AuditPage,{key:auditDataset,initialDataset:auditDataset}),
      page==='upload'&&React.createElement(UploadPage,null),
      page==='about'&&React.createElement(AboutPage,null),
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
