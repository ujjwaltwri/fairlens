# ─────────────────────────────────────────────────────────────────────────────
# FairLens — CI/CD pipeline for Google Cloud Run
#
# Triggers:
#   push to main  → build + deploy to Cloud Run
#   pull request  → build only (no deploy)
#
# Required GitHub secrets:
#   GCP_PROJECT_ID      — your GCP project ID  (e.g. fairlens-prod-123456)
#   GCP_REGION          — Cloud Run region      (e.g. us-central1)
#   GCP_SA_KEY          — JSON key for a service account with roles:
#                           Cloud Run Admin
#                           Artifact Registry Writer
#                           Service Account User
#   SUPABASE_URL        — Supabase project URL
#   SUPABASE_KEY        — Supabase service-role key
#   GEMINI_API_KEY      — Google AI Studio API key
#
# One-time setup (run these locally once):
#   gcloud artifacts repositories create fairlens \
#       --repository-format=docker \
#       --location=$GCP_REGION \
#       --project=$GCP_PROJECT_ID
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  SERVICE_NAME: fairlens-api
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fairlens/api

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── Deploy (main branch only) ──────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 600 \
            --set-env-vars "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            --set-env-vars "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)")
          echo "Deployed: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.SERVICE_URL }}/)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed — HTTP $STATUS"